services:
  # ---------------------------------------------------------------------------
  # Databases
  # ---------------------------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  postgres:
    image: postgres:16
    ports:
      - "${PG_HOST_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: sap_o2c
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------------------------------------------------------------------------
  # One-shot: load JSONL data into Neo4j
  # ---------------------------------------------------------------------------
  data-loader:
    build:
      context: ./data_creation
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_BOLT_URL: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}

  # ---------------------------------------------------------------------------
  # Backend – FastAPI (imports agent as a library)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: web/server/Dockerfile
    ports:
      - "8000:8000"
    depends_on:
      neo4j:
        condition: service_healthy
      data-loader:
        condition: service_completed_successfully
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-xiaomi/mimo-v2-pro}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_BASE_URL: ${LANGFUSE_BASE_URL:-}

  # ---------------------------------------------------------------------------
  # Frontend – SvelteKit dev server
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: .
      dockerfile: web/frontend/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    environment:
      API_BACKEND_URL: http://backend:8000

volumes:
  neo4j_data:
  postgres_data:
